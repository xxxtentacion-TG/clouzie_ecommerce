{% extends "adminpanel/base.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<!-- HEADER -->
<div class="flex items-center justify-between mb-10">

    <div class="flex items-center gap-4">

        <!-- BACK -->
        <a href="{% url 'adminpanel:products' %}"
           class="flex items-center gap-2 text-gray-600 hover:text-black transition">
            <span class="material-symbols-outlined text-[20px]">
                arrow_back
            </span>
            <span class="hidden sm:block text-sm font-medium">Back</span>
        </a>

        <!-- TITLE -->
        <div>
            <h2 class="text-xl sm:text-2xl font-semibold tracking-tight">
                Edit Product
            </h2>
            <p class="text-gray-400 text-xs sm:text-sm">
                Update product details
            </p>
        </div>

    </div>

</div>

<!-- FORM -->
<form method="POST"
      class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 sm:p-8 space-y-8 animate-scaleIn">

    {% csrf_token %}

    <!-- BASIC -->
    <div class="space-y-6">

        <h4 class="text-xs font-semibold tracking-widest text-gray-400 uppercase">
            Basic Info
        </h4>

        <!-- NAME -->
        <div>
            <label class="text-xs text-gray-500">Product Name</label>
            <input type="text" name="name" value="{{ product.name }}"
                   class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
                   focus:outline-none focus:ring-0 focus:border-black bg-white">
        </div>

        <!-- SLUG -->
        <div>
            <label class="text-xs text-gray-500">Slug</label>
            <input type="text" name="slug" value="{{ product.slug }}"
                   class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
                   focus:outline-none focus:ring-0 focus:border-black bg-white">
        </div>

        <!-- WEIGHT -->
<div>
    <label class="text-xs text-gray-500">Weight (kg)</label>
    <input type="number" step="0.01" name="weight"
           value="{{ product.weight }}"
           class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
           focus:outline-none focus:ring-0 focus:border-black bg-white transition">
</div>

        <!-- CATEGORY + SUBCATEGORY -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <!-- CATEGORY -->
            <div>
                <label class="text-xs text-gray-500">Category</label>
                <select name="category"
                        class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
                        focus:outline-none focus:ring-0 focus:border-black bg-white">

                    {% for cat in categories %}
                        <option value="{{ cat.id }}"
                        {% if product.category.id == cat.id %}selected{% endif %}>
                            {{ cat.name }}
                        </option>
                    {% endfor %}

                </select>
            </div>

            <!-- SUBCATEGORY -->
            <div>
                <label class="text-xs text-gray-500">Subcategory</label>
                <select name="subcategory"
                        class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
                        focus:outline-none focus:ring-0 focus:border-black bg-white">

                    {% for sub in subcategories %}
                        <option value="{{ sub.id }}"
                        {% if product.subcategory.id == sub.id %}selected{% endif %}>
                            {{ sub.name }}
                        </option>
                    {% endfor %}

                </select>
            </div>

        </div>

    </div>

    <!-- DETAILS -->
    <div class="space-y-6">

    <h4 class="text-xs font-semibold tracking-widest text-gray-400 uppercase">
        Product Details
    </h4>

    <!-- DESCRIPTION -->
    <div>
        <label class="text-xs text-gray-500">Description</label>
        <textarea name="description" rows="3"
            class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
            focus:outline-none focus:ring-0 focus:border-black bg-white resize-none">{{ product.description }}</textarea>
    </div>

    <!-- MATERIALS -->
    <div>
        <label class="text-xs text-gray-500">Materials</label>
        <textarea name="materials" rows="2"
            class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
            focus:outline-none focus:ring-0 focus:border-black bg-white resize-none">{{ product.materials }}</textarea>
    </div>

    <!-- CARE GUIDE -->
    <div>
        <label class="text-xs text-gray-500">Care Guide</label>
        <textarea name="care_guide" rows="2"
            class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
            focus:outline-none focus:ring-0 focus:border-black bg-white resize-none">{{ product.care_guide }}</textarea>
    </div>

</div>

    <!-- EXTRA -->
    <div class="space-y-6">

        <h4 class="text-xs font-semibold tracking-widest text-gray-400 uppercase">
            Additional
        </h4>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <textarea name="delivery" rows="2"
                      class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
                      focus:outline-none focus:ring-0 focus:border-black bg-white resize-none">{{ product.delivery }}</textarea>

            <textarea name="payment_returns" rows="2"
                      class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm 
                      focus:outline-none focus:ring-0 focus:border-black bg-white resize-none">{{ product.payment_returns }}</textarea>

        </div>

    </div>

    <!-- STATUS -->
    <div class="flex items-center justify-between pt-4 border-t">

        <div>
            <p class="text-sm font-medium text-gray-700">Product Status</p>
            <p class="text-xs text-gray-400">Enable product visibility</p>
        </div>

        <!-- TOGGLE -->
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" name="is_active" class="sr-only peer"
                   {% if product.is_active %}checked{% endif %}>

            <div class="w-11 h-6 bg-gray-200 rounded-full peer
                        peer-checked:bg-black
                        after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                        after:bg-white after:rounded-full after:h-5 after:w-5
                        after:transition-all
                        peer-checked:after:translate-x-full">
            </div>
        </label>

    </div>

    <!-- BUTTON -->
    <div class="flex justify-end pt-4">
        <button type="submit"
                class="bg-black text-white px-6 py-2.5 rounded-xl text-xs tracking-widest
                       hover:bg-gray-800 transition active:scale-[0.97]">
            UPDATE PRODUCT
        </button>
    </div>

</form>

{% endblock %}
