{% extends "adminpanel/base.html" %}

{% block title %}Edit Subcategory{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">

    <!-- HEADER -->
    <div class="mb-8 text-center">
        <h2 class="text-2xl font-semibold tracking-tight">Edit Subcategory</h2>
        <p class="text-gray-400 text-sm mt-1">
            Update your subcategory details
        </p>
    </div>

    <!-- CARD -->
    <div class="bg-white border rounded-2xl shadow-sm p-6 sm:p-8">

        <form method="POST">
            {% csrf_token %}

            <div class="space-y-5">

                <!-- NAME -->
                <div>
                    <label class="text-xs text-gray-400 tracking-wider uppercase">
                        Subcategory Name
                    </label>

                    <input type="text"
                           name="name"
                           value="{{ subcategory.name }}"
                           class="w-full mt-2 px-4 py-2.5 border rounded-xl text-sm
                                  focus:outline-none focus:border-black transition">
                </div>

                <!-- CATEGORY -->
                <div>
                    <label class="text-xs text-gray-400 tracking-wider uppercase">
                        Category
                    </label>

              <select name="category"
        class="w-full mt-2 px-4 py-2.5 border rounded-xl text-sm
               focus:outline-none focus:border-black">

    {% for cat in categories %}
        <option value="{{ cat.id }}"
            {% if cat.id|stringformat:"s" == subcategory.category.id|stringformat:"s" %}
                selected
            {% endif %}>
            
            {{ cat.name }}
        </option>
    {% endfor %}

</select>
                </div>

                <!-- STATUS -->
                <div class="flex items-center justify-between pt-2">

                    <span class="text-sm text-gray-500">Active Status</span>

                    <label class="relative inline-flex items-center cursor-pointer">

                        <input type="checkbox"
                               name="is_active"
                               class="sr-only peer"
                               {% if subcategory.is_active %}checked{% endif %}>

                        <!-- TRACK -->
                        <div class="w-11 h-6 bg-gray-200 rounded-full 
                                    peer-checked:bg-black 
                                    transition-all duration-300">
                        </div>

                        <!-- CIRCLE -->
                        <div class="absolute top-[2px] left-[2px] w-5 h-5 bg-white rounded-full 
                                    shadow-md transition-all duration-300 
                                    peer-checked:translate-x-full">
                        </div>

                    </label>

                </div>

            </div>

            <!-- BUTTONS -->
            <div class="mt-8 flex justify-end gap-3">

                <a href="{% url 'adminpanel:subcategory' %}"
                   class="px-5 py-2.5 border rounded-xl text-sm hover:bg-gray-100 transition">
                    Cancel
                </a>

                <button type="submit"
                        class="px-6 py-2.5 bg-black text-white rounded-xl text-sm tracking-wide 
                               hover:bg-gray-800 transition">
                    Update Subcategory
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
