<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CLOUZIE Admin Portal | Secure Access</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- 🔥 ORIGINAL FONT (RESTORED) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>

<style>
body {
    font-family: 'Inter', sans-serif;
}

.font-playfair {
    font-family: 'Playfair Display', serif;
}

.btn-brand-black {
    background-color: #000000;
}
.btn-brand-black:hover {
    background-color: #1A1A1A;
}
</style>

</head>

<body class="bg-brand-brown min-h-screen flex flex-col items-center justify-center p-4">

<!-- MAIN -->
<main class="w-full max-w-[420px] flex flex-col items-center gap-8">

<!-- LOGIN CARD -->
<section class="w-full bg-white rounded-2xl shadow-2xl p-8 md:p-10">

<!-- HEADER -->
<div class="text-center mb-10">
<h1 class="font-playfair text-2xl md:text-3xl font-bold tracking-tight text-black mb-2 uppercase">
CLOUZIE ADMIN PORTAL
</h1>
<p class="text-gray-500 text-sm">
Secure access for authorized personnel only
</p>
</div>

<!-- 🔥 ERROR MESSAGE (ADDED) -->
{% if error %}
<div class="mb-6 flex items-start gap-3 border border-black/20 bg-white text-black px-5 py-4 rounded-xl shadow-sm">
    
    <div class="flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-black opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-width="2"
            d="M12 9v2m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.67 1.73-3L13.73 4c-.77-1.33-2.69-1.33-3.46 0L3.34 16c-.77 1.33.19 3 1.73 3z" />
        </svg>
    </div>

    <div class="flex-1">
        <p class="text-sm font-semibold tracking-wide">Something went wrong</p>
        <p class="text-xs opacity-70 mt-1">{{ error }}</p>
    </div>

</div>
{% endif %}

<!-- FORM -->
<form method="POST" class="space-y-6">
{% csrf_token %}

<!-- EMAIL -->
<div class="flex flex-col gap-2">
<label class="text-xs uppercase tracking-wider text-gray-700">
Email Address
</label>

<input type="email" name="email" required
class="w-full px-4 py-3 text-base rounded-lg border border-gray-200 focus:ring-1 focus:ring-black focus:border-black outline-none"
placeholder="admin@clouzie.com"/>
</div>

<!-- PASSWORD -->
<div class="flex flex-col gap-2">
<label class="text-xs uppercase tracking-wider text-gray-700">
Password
</label>

<div class="relative">

<input type="password" name="password" id="password" required
class="w-full px-4 py-3 text-base rounded-lg border border-gray-200 focus:ring-1 focus:ring-black focus:border-black outline-none"
placeholder="••••••••"/>

<!-- 🔥 ICON BUTTON -->
<button type="button"
onclick="togglePasswordVisibility()"
class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black transition">

<!-- EYE ICON -->
<svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round"
d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
<path stroke-linecap="round" stroke-linejoin="round"
d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
</svg>

</button>

</div>
</div>

<div class="flex justify-end mt-1">
<a href="#" class="text-xs text-gray-500 hover:text-black underline">
Forgot Password?
</a>
</div>

<!-- BUTTON -->
<div class="pt-4">
<button type="submit"
class="btn-brand-black w-full text-white text-sm tracking-widest py-4 rounded-lg transition active:scale-[0.98] uppercase">
SIGN IN TO DASHBOARD
</button>
</div>

</form>

</section>

<!-- FOOTER -->
<footer class="text-center">
<p class="text-gray-400 text-xs tracking-wide">
© 2026 CLOUZIE. All rights reserved.
</p>
</footer>

</main>

<!-- JS -->
<script>
function togglePasswordVisibility() {
const passwordInput = document.getElementById('password');

if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
} else {
    passwordInput.type = 'password';
}
}
</script>

</body>
</html>
