<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password | CLOUZIE</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'sans-serif'],
        serif: ['Playfair Display', 'serif'],
      },
    }
  }
}
</script>

<style>
body, html {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

/* INPUT STYLE */
.underline-input {
  border: none !important;
  border-bottom: 1px solid #000 !important;
  background: transparent;
  padding: 14px 0 !important;
  width: 100%;
  font-size: 12px;
  letter-spacing: 0.15em;
}

.underline-input:focus {
  outline: none !important;
  border-bottom: 2px solid #000 !important;
}

/* ICON */
.input-wrapper {
  position: relative;
}

.eye-btn {
  position: absolute;
  right: 0;
  bottom: 10px;
  color: #9ca3af;
  transition: 0.2s;
}

.eye-btn:hover {
  color: black;
}
</style>

</head>

<body class="bg-white font-sans antialiased">

<main class="flex flex-col lg:flex-row h-screen w-full">

<!-- LEFT -->
<section class="w-full lg:w-[45%] h-screen flex items-center justify-center px-6 md:px-16 lg:px-20">

<div class="w-full max-w-[360px]">

<h1 class="font-serif text-3xl mb-8 text-center lg:text-left">CLOUZIE</h1>

<div class="text-center lg:text-left">
<h2 class="font-serif text-2xl tracking-[0.1em] mb-4">
Reset your password
</h2>

<p class="text-gray-500 text-sm mb-10">
Create a new password for your account.
</p>
</div>
{% if error %}
<div class="mb-8 border border-black/10 rounded-xl px-5 py-4 flex gap-4 items-start">

<div class="w-[2px] bg-black h-full"></div>

<div>
<p class="text-[10px] uppercase tracking-[0.3em] text-black/40">Error</p>
<p class="text-sm mt-1">{{ error }}</p>
</div>

</div>
{% endif %}
<form class="space-y-8" action="{% url 'reset_password' %}" method="POST">
{% csrf_token %}

<!-- NEW PASSWORD -->
<div class="input-wrapper">
<label class="block text-[10px] tracking-[0.2em] uppercase mb-1">
New Password
</label>

<input id="password" class="underline-input pr-8" type="password" name="password" required>

<button type="button" onclick="togglePassword('password', this)" class="eye-btn">

<!-- eye open -->
<svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12z"/>
<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
d="M12 15.75a3.75 3.75 0 100-7.5 3.75 3.75 0 000 7.5z"/>
</svg>

<!-- eye close -->
<svg class="w-5 h-5 eye-close hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
d="M17.94 17.94A10.94 10.94 0 0112 19.5c-6 0-9.75-7.5-9.75-7.5a21.77 21.77 0 015.06-6.69M9.53 9.53A3.75 3.75 0 0114.47 14.47M3 3l18 18M10.58 5.08A10.94 10.94 0 0112 4.5c6 0 9.75 7.5 9.75 7.5a21.77 21.77 0 01-4.23 5.73"/>
</svg>

</button>
</div>

<!-- CONFIRM PASSWORD -->
<div class="input-wrapper">
<label class="block text-[10px] tracking-[0.2em] uppercase mb-1">
Confirm Password
</label>

<input id="confirmPassword" class="underline-input pr-8" type="password" name="cnfmpassword" required>

<button type="button" onclick="togglePassword('confirmPassword', this)" class="eye-btn">

<!-- eye open -->
<svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12z"/>
<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
d="M12 15.75a3.75 3.75 0 100-7.5 3.75 3.75 0 000 7.5z"/>
</svg>

<!-- eye close -->
<svg class="w-5 h-5 eye-close hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
d="M17.94 17.94A10.94 10.94 0 0112 19.5c-6 0-9.75-7.5-9.75-7.5a21.77 21.77 0 015.06-6.69M9.53 9.53A3.75 3.75 0 0114.47 14.47M3 3l18 18M10.58 5.08A10.94 10.94 0 0112 4.5c6 0 9.75 7.5 9.75 7.5a21.77 21.77 0 01-4.23 5.73"/>
</svg>

</button>
</div>

<button class="w-full bg-black text-white py-4 text-xs tracking-[0.3em] uppercase hover:bg-zinc-800 transition">
RESET PASSWORD
</button>

<div class="text-center mt-6">
<a href="{% url 'sigin' %}" 
class="text-[11px] tracking-widest uppercase text-black border-b border-black pb-0.5 hover:opacity-60 transition">
BACK TO LOGIN
</a>
</div>

</form>

</div>

</section>

<!-- RIGHT IMAGE -->
<section class="hidden lg:block lg:w-[55%] h-screen">
<img class="w-full h-full object-cover grayscale"
src="https://image.hm.com/assets/hm/65/c2/65c273c03bbea1100ff6700ee7e717e957499ac1.jpg?imwidth=2160"/>
</section>

</main>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const openIcon = btn.querySelector('.eye-open');
    const closeIcon = btn.querySelector('.eye-close');

    if (input.type === "password") {
        input.type = "text";
        openIcon.classList.add("hidden");
        closeIcon.classList.remove("hidden");
    } else {
        input.type = "password";
        openIcon.classList.remove("hidden");
        closeIcon.classList.add("hidden");
    }
}
</script>

</body>
</html>
