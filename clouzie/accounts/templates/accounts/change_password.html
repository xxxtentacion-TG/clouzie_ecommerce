<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLOUZIE | Change Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
}

/* Brand font */
.name-font {
    font-family: 'DM Serif Display', serif;
    letter-spacing: 0.05em;
}

/* Input (PROFILE STYLE) */
.input-style {
    width: 100%;
    border: none;
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 0;
    outline: none;
}
.input-style:focus {
    border-color: black;
}

/* Button (PROFILE STYLE) */
.btn-main {
    border: 1px solid black;
    padding: 10px 20px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: 0.3s;
}
.btn-main:hover {
    background: black;
    color: white;
}

/* Error */
.error-text {
    color: #dc2626;
    font-size: 12px;
    margin-top: 4px;
}

/* Eye icon */
.eye-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}
</style>

</head>

<body class="bg-white text-black">

<!-- HEADER -->
<header class="border-b border-zinc-200 py-5 relative text-center">

    <button onclick="history.back()" class="absolute left-6 top-1/2 -translate-y-1/2 text-lg">
        ←
    </button>

    <h1 class="name-font text-lg uppercase tracking-[0.2em]">
        CLOUZIE
    </h1>

</header>

<!-- MAIN -->
<main class="pt-10 flex justify-center">

    <div class="w-full max-w-[480px] px-6">

        <!-- PAGE TITLE -->
        <h2 class="text-[13px] tracking-[0.35em] uppercase text-zinc-500 text-center mb-10">
            Change Password
        </h2>

        <!-- ERROR -->
      {% if error %}
<div class="mb-8 border border-black/10 rounded-xl px-5 py-4 flex gap-4 items-start">

<div class="w-[2px] bg-black h-full"></div>

<div>
<p class="text-[10px] uppercase tracking-[0.3em] text-black/40">Error</p>
<p class="text-sm mt-1">{{ error }}</p>
</div>

</div>
{% endif %}

        <!-- FORM -->
        <form method="POST" action="{% url 'change_password' %}" class="space-y-8">
            {% csrf_token %}

            <!-- CURRENT PASSWORD -->
            <div class="relative">
                <label class="text-[11px] uppercase tracking-[0.2em] text-zinc-400">
                    Current Password
                </label>

                <input type="password" id="current" name="old_password" class="input-style" value="{{ old_password }}">

                <span class="eye-btn" onclick="togglePassword('current', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </span>
            </div>

            <!-- NEW PASSWORD -->
            <div class="relative">
                <label class="text-[11px] uppercase tracking-[0.2em] text-zinc-400">
                    New Password
                </label>

                <input type="password" id="new" name="new_password" class="input-style" value="{{ new_password }}">

                <span class="eye-btn" onclick="togglePassword('new', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </span>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="relative">
                <label class="text-[11px] uppercase tracking-[0.2em] text-zinc-400">
                    Confirm Password
                </label>
                <input type="password" id="confirm" name="confirm_password" class="input-style" value="{{ cnfrm_password }}">

                <span class="eye-btn" onclick="togglePassword('confirm', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </span>

                
            </div>

            <!-- BUTTON -->
            <div class="text-center pt-6">
                <button type="submit" class="btn-main">
                    Update Password
                </button>
            </div>

        </form>

    </div>

</main>

<script>
function togglePassword(id, el) {
    const input = document.getElementById(id);
    const svg = el.querySelector("svg");

    if (input.type === "password") {
        input.type = "text";

        // 👁 OPEN EYE
        svg.innerHTML = `
        <path stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        `;

    } else {
        input.type = "password";

        // 🔒 CLOSED EYE (NO SLASH — CLEAN)
        svg.innerHTML = `
        <path stroke-width="1.5" d="M4 12s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z"/>
        <path stroke-width="1.5" d="M9 12a3 3 0 006 0"/>
        `;
    }
}
</script>

</body>
</html>
