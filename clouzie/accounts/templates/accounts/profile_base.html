<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLOUZIE</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
}

.name-font {
    font-family: 'DM Serif Display', serif;
    letter-spacing: 0.05em;
}

/* 🔥 FIXED SIDEBAR (NO COLOR HERE) */
.sidebar-link {
    position: relative;
    padding-left: 6px;
    transition: 0.3s;
}

.sidebar-link::before {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    width: 2px;
    height: 0;
    background: black;
    transform: translateY(-50%);
    transition: 0.3s;
}

.sidebar-link:hover::before,
.sidebar-active::before {
    height: 60%;
}

.sidebar-link:hover {
    padding-left: 10px;
    color: black;
}

.sidebar-active {
    color: black;
}
</style>

</head>

<body class="bg-white text-black">

<!-- HEADER -->
<header class="border-b border-zinc-200 py-5 relative text-center">

    <!-- LEFT: MOBILE MENU -->
    <button onclick="toggleSidebar()" 
    class="absolute left-5 top-1/2 -translate-y-1/2 lg:hidden text-xl">
        ☰
    </button>

    <!-- LEFT: DESKTOP BACK -->
    <a href="{% url 'home_main' %}" 
       class="hidden lg:block absolute left-6 top-1/2 -translate-y-1/2 
       text-[11px] uppercase tracking-[0.25em] text-black border-b border-black pb-[2px]">
       Back Home
    </a>

    <!-- 🔥 PERFECT CENTER (IMPORTANT) -->
    <h1 class="name-font text-lg uppercase">
        CLOUZIE
    </h1>

</header>
<!-- MOBILE SIDEBAR -->
<div id="mobileSidebar" class="fixed top-0 left-0 w-[220px] h-full bg-white z-50 p-6 border-r border-zinc-200 -translate-x-full transition lg:hidden">

    <button onclick="toggleSidebar()" class="mb-8 text-xl">✕</button>

    <p class="text-[10px] text-zinc-400 uppercase tracking-[0.3em] mb-6">Menu</p>

    <nav class="flex flex-col gap-6 text-[12px] uppercase tracking-[0.2em]">

    <a href="{% url 'profile' %}" 
    class="sidebar-link {% if request.resolver_match.url_name == 'profile' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
        Profile
    </a>

    <a href="{% url 'orders' %}" 
    class="sidebar-link {% if request.resolver_match.url_name == 'orders' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
        Orders
    </a>

    <a href="{% url 'wishlist' %}" 
    class="sidebar-link {% if request.resolver_match.url_name == 'wishlist' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
        Wishlist
    </a>

    <a href="{% url 'address' %}" 
    class="sidebar-link {% if request.resolver_match.url_name == 'address' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
        Addresses
    </a>

</nav>

</div>

<div id="overlay" onclick="toggleSidebar()" 
class="hidden fixed inset-0 bg-black/30 z-40 lg:hidden"></div>

<!-- MAIN -->
<div class="w-full flex justify-center pt-6 pb-12">

    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden lg:flex flex-col items-center justify-start w-[160px] pt-10 border-r border-zinc-200">

    <p class="text-[10px] text-zinc-400 uppercase tracking-[0.3em] mb-8 text-center">
        Menu
    </p>

    <nav class="flex flex-col items-center gap-8 text-[13px] tracking-[0.25em] uppercase text-center">

        <a href="{% url 'profile' %}" 
           class="sidebar-link {% if request.resolver_match.url_name == 'profile' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
            Profile
        </a>

        <a href="{% url 'orders' %}" 
           class="sidebar-link {% if request.resolver_match.url_name == 'orders' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
            Orders
        </a>

        <a href="{% url 'wishlist' %}" 
           class="sidebar-link {% if request.resolver_match.url_name == 'wishlist' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
            Wishlist
        </a>

        <a href="{% url 'address' %}" 
           class="sidebar-link {% if request.resolver_match.url_name == 'address' %}sidebar-active text-black{% else %}text-zinc-400{% endif %}">
            Addresses
        </a>

    </nav>

</aside>

    <!-- CONTENT -->
    <main class="flex-1 pt-10 flex justify-center">
<a href="{% url 'home_main' %}" 
   class="lg:hidden absolute left-4 top-[95px] text-black">

    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5"
         viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" 
              d="M15 18l-6-6 6-6"/>
    </svg>

</a>

<div class="w-full max-w-5xl px-4 relative">

    <!-- 🔥 BACK ARROW (ADD HERE) -->
 {% block content %}
 {% endblock %}
    </main>

</div>

<!-- JS -->
<script>
function toggleSidebar() {
    const sidebar = document.getElementById('mobileSidebar');
    const overlay = document.getElementById('overlay');

    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
}

window.onload = function() {
    const params = new URLSearchParams(window.location.search);

    if (params.get("success") === "1") {
        document.getElementById("successPopup").classList.remove("hidden");
    }

    if (params.get("error") === "1") {
        document.getElementById("errorPopup").classList.remove("hidden");
    }
}

function closePopup() {
    const popup = document.getElementById("successPopup");
    popup.classList.add("hidden");
    popup.classList.remove("flex");
}

window.onload = function() {
    const params = new URLSearchParams(window.location.search);

    if (params.get("success") === "1") {
        document.getElementById("successPopup").classList.remove("hidden");
        document.getElementById("successPopup").classList.add("flex");

        // 🔥 REMOVE PARAM FROM URL
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    if (params.get("error") === "1") {
        document.getElementById("errorPopup").classList.remove("hidden");
        document.getElementById("errorPopup").classList.add("flex");

        // 🔥 REMOVE PARAM FROM URL
        window.history.replaceState({}, document.title, window.location.pathname);
    }
}

function closeError() {
    document.getElementById("errorPopup").classList.add("hidden");
}

document.addEventListener("DOMContentLoaded", function () {

    const pincodeInput = document.getElementById("pincode");

    if (pincodeInput) {
    pincodeInput.addEventListener("input", function() {
        console.log("User typing pincode:", this.value);
    });
    }

    console.log("JS Loaded ✅"); // 🔥 check this

    pincodeInput.addEventListener("input", function () {

        let pincode = this.value.trim();

        console.log("Typing:", pincode); // 🔥 check this

        if (pincode.length === 6) {

            fetch(`https://api.postalpincode.in/pincode/${pincode}`)
            .then(res => res.json())
            .then(data => {

                console.log("API:", data); // 🔥 MUST SHOW

                if (data[0].Status === "Success") {

                    const postOffice = data[0].PostOffice[0];

                    document.getElementById("city").value = postOffice.District;
                    document.getElementById("state").value = postOffice.State;

                }

            });

        }

    });

});
 
</script>
 <!-- 🔥 ZARA STYLE CENTER POPUP -->
<div id="successPopup" class="fixed inset-0 hidden items-center justify-center z-50">

    <!-- LIGHT OVERLAY -->
    <div class="absolute inset-0 bg-black/10"></div>

    <!-- POPUP BOX -->
    <div class="relative bg-white px-16 py-10 text-center border border-zinc-200">

        <!-- MESSAGE -->
        <p class="text-[11px] uppercase tracking-[0.35em] text-black mb-8">
            Address Saved Successfully
        </p>

        <!-- BUTTON -->
        <button onclick="closePopup()" 
        class="px-6 py-2 border border-black text-[11px] uppercase tracking-[0.25em] 
        hover:bg-black hover:text-white transition">
            OK
        </button>

    </div>

</div>

<div id="errorPopup" class="fixed inset-0 hidden items-center justify-center z-50">

    <div class="absolute inset-0 bg-black/10"></div>

    <div class="relative bg-white px-16 py-10 text-center border border-zinc-200">

        <p class="text-[11px] uppercase tracking-[0.35em] text-black mb-8">
            Please fill all fields
        </p>

        <button onclick="closeError()" 
        class="px-6 py-2 border border-black text-[11px] uppercase tracking-[0.25em]">
            OK
        </button>

    </div>

</div>

</body>
</html>
