<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    padding: 40px;
}
.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
}
.logo {
    font-family: serif;
    letter-spacing: 0.2em;
    font-size: 22px;
    margin-bottom: 20px;
}
.otp-box {
    font-size: 28px;
    letter-spacing: 8px;
    margin: 20px 0;
    font-weight: bold;
}
.text {
    color: #555;
    font-size: 14px;
}
.footer {
    margin-top: 30px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">CLOUZIE</div>

    <h2>Verify Your Account</h2>

    <p class="text">
        Use the verification code below to complete your sign up.
    </p>

    <div class="otp-box">
        {{ otp }}
    </div>

    <p class="text">
        This code will expire in 5 minutes.
    </p>

    <div class="footer">
        © CLOUZIE — Premium Menswear
    </div>

</div>

</body>
</html>
