{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register | CLOUZIE</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400..900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        serif: ['"Bodoni Moda"', 'serif'],
        sans: ['"Inter"', 'sans-serif'],
      },
    },
  },
}
</script>

<style>
.logo-font {
  font-family: 'Bodoni Moda', serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.form-label {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: #71717a;
}

.footer-text {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: #a1a1aa;
}

.minimal-input {
  border: none;
  border-bottom: 1px solid #d4d4d8;
  background: transparent;

  /* ADD THESE 👇 */
  padding: 14px 0;
  width: 100%;
  font-size: 12px;
  letter-spacing: 0.15em;
}

.minimal-input:focus {
  outline: none;
  border-bottom-color: black;
}
/* BUTTON ANIMATION */
.btn-animate {
  position: relative;
  overflow: hidden;
  transition: all 0.2s ease;
}

/* text animation */
.btn-text {
  display: inline-block;
  transition: transform 0.4s ease, opacity 0.3s ease;
}

/* slide effect */
.btn-slide .btn-text {
  transform: translateX(50px);
  opacity: 0;
}

/* subtle press */
.btn-animate:active {
  transform: scale(0.98);
}

/* hover (premium feel) */
.btn-animate:hover {
  background-color: black;
  color: white;
}
</style>

</head>

<body class="bg-white text-black font-sans antialiased">

<main class="flex flex-col lg:flex-row h-screen w-full">

<!-- LEFT: SCROLLABLE FORM -->
<section class="w-full lg:w-[45%] h-screen overflow-y-auto flex flex-col p-6 sm:p-10 lg:p-20">

<!-- Logo -->
<div class="mb-10">
<h1 class="logo-font text-2xl sm:text-3xl font-bold">CLOUZIE</h1>
</div>

<!-- Form Wrapper -->
<div class="max-w-md w-full mx-auto lg:mx-0">

<h2 class="text-xl sm:text-2xl mb-10 tracking-widest font-light uppercase">
Register
</h2>


    {% if error %}
<div class="mb-6 flex items-start gap-3 border border-black/20 bg-white text-black px-5 py-4 rounded-xl shadow-sm">
    
    <!-- Icon -->
    <div class="flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-black opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.67 1.73-3L13.73 4c-.77-1.33-2.69-1.33-3.46 0L3.34 16c-.77 1.33.19 3 1.73 3z" />
        </svg>
    </div>

    <!-- Message -->
    <div class="flex-1">
        <p class="text-sm font-semibold tracking-wide">Something went wrong</p>
        <p class="text-xs opacity-70 mt-1">{{ error }}</p>
    </div>

    <!-- Close button (optional UI only) -->
    <button class="text-black/40 hover:text-black transition text-sm">
        ✕
    </button>

</div>
{% endif %}
<!-- Name -->
 <form method="POST" action="{% url 'signup' %}">
    {% csrf_token %}
<div>
<label class="form-label uppercase">Name</label>
<input class="minimal-input w-full py-2" type="text" required name="username" value="{{ username }}">
</div>

<!-- Email -->
<div>
<label class="form-label uppercase">Email</label>
<input class="minimal-input w-full py-2" type="email" required name="email" value="{{ email }}">
</div>

<!-- Password -->
<div class="relative">
    <label class="form-label uppercase">Password</label>

    <input id="password"
        class="minimal-input w-full py-2 pr-10"
        type="password"
        required
        name="password">

    <button type="button"
        onclick="togglePassword('password', this)"
        class="absolute right-0 bottom-2 text-gray-400 hover:text-black transition">

        <!-- Eye Open -->
        <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z"/>
            <circle cx="12" cy="12" r="3" stroke-width="1.5"/>
        </svg>

        <!-- Eye Closed -->
        <!-- Eye Closed -->
    <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
        d="M17.94 17.94A10.94 10.94 0 0112 19.5c-6 0-9.75-7.5-9.75-7.5a21.77 21.77 0 015.06-6.69M9.53 9.53A3.75 3.75 0 0114.47 14.47M3 3l18 18M10.58 5.08A10.94 10.94 0 0112 4.5c6 0 9.75 7.5 9.75 7.5a21.77 21.77 0 01-4.23 5.73"/>
    </svg>

    </button>
</div>


<!-- Confirm Password -->
<div class="relative">
    <label class="form-label uppercase">Confirm Password</label>

    <input id="confirmPassword"
        class="minimal-input w-full py-2 pr-10"
        type="password"
        required
        name="confirmPassword">

    <button type="button"
        onclick="togglePassword('confirmPassword', this)"
        class="absolute right-0 bottom-2 text-gray-400 hover:text-black transition">

        <!-- Eye Open -->
        <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z"/>
            <circle cx="12" cy="12" r="3" stroke-width="1.5"/>
        </svg>

        <!-- Eye Closed -->
        <!-- Eye Closed -->
    <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
        d="M17.94 17.94A10.94 10.94 0 0112 19.5c-6 0-9.75-7.5-9.75-7.5a21.77 21.77 0 015.06-6.69M9.53 9.53A3.75 3.75 0 0114.47 14.47M3 3l18 18M10.58 5.08A10.94 10.94 0 0112 4.5c6 0 9.75 7.5 9.75 7.5a21.77 21.77 0 01-4.23 5.73"/>
    </svg>

    </button>
</div>

<!-- Buttons -->
<!-- Buttons -->
<div class="pt-6 space-y-3">

<button class="w-full bg-black text-white py-4 text-xs tracking-widest hover:bg-zinc-800 transition" type="submit">
REGISTER
</button>

<!-- ✅ GOOGLE LOGIN LINK -->
<a href="{% url 'sigin' %}"
class="w-full border border-gray-300 py-4 text-xs tracking-widest flex items-center justify-center gap-3 hover:bg-gray-50 transition">

<svg class="w-4 h-4" viewBox="0 0 24 24">
<path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
<path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
<path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
<path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
</svg>

CONTINUE WITH GOOGLE
</a>

<!-- ✅ LOGIN LINK -->
<a href="{% url 'sigin' %}" id="loginBtn"
class="btn-animate w-full bg-white text-black border border-black py-4 text-xs tracking-[0.3em] uppercase block text-center">

<span class="btn-text">LOG IN</span>

</a>

</div>

</form>

<!-- Footer -->
<p class="footer-text mt-10 uppercase text-center lg:text-left">
© 2023 CLOUZIE CLOTHING
</p>

</div>

</section>


<!-- RIGHT: FIXED IMAGE -->
<section class="hidden lg:block w-[55%] h-screen sticky top-0">

<img class="w-full h-full object-cover grayscale"
src="{% static 'accounts/images/singup.jpg' %}">

<div class="absolute inset-0 bg-black/5"></div>

</section>

</main>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const openIcon = btn.querySelector('.eye-open');
    const closedIcon = btn.querySelector('.eye-closed');

    if (!input) return;

    if (input.type === "password") {
        input.type = "text";
        openIcon.classList.add("hidden");
        closedIcon.classList.remove("hidden");
    } else {
        input.type = "password";
        openIcon.classList.remove("hidden");
        closedIcon.classList.add("hidden");
    }
}

</script>

</body>
</html>
