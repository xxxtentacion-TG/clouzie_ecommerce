{% extends 'accounts/profile_base.html' %}

{% block content %}

<div class="w-full max-w-[720px] mx-auto px-0 md:px-4 pb-28 flex justify-center"> <!-- 🔥 EXTRA BOTTOM SPACE -->

    <!-- 🔥 CARD WRAPPER (PREMIUM LOOK) -->
    <div class="bg-white border border-zinc-200 rounded-2xl p-6 md:p-10 w-full max-w-[640px]">

        <!-- 🔥 TITLE -->
        <div class="mb-10">
            <p class="text-[10px] text-zinc-400 tracking-[0.25em] uppercase mb-3">
                My Addresses / Add Address
            </p>

            <h2 class="text-[18px] md:text-[22px] tracking-[0.25em] uppercase">
                Add Address
            </h2>
        </div>

        <!-- 🔥 FORM -->
        <form method="POST" class="space-y-10">
            {% csrf_token %}

            <!-- SECTION -->
            <div>
                <h3 class="text-[11px] tracking-[0.25em] uppercase text-zinc-500 mb-6">
                    Shipping Information
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- INPUT -->
                    <div>
                        <label class="label">Full Name</label>
                        <input type="text" name="full_name" class="input" required>
                    </div>

                    <div>
                        <label class="label">Mobile Number</label>
                        <input type="text" name="phone_number" class="input" required pattern="[0-9]{10}" maxlength="10">
                    </div>

                    <div>
                        <label class="label">Pincode</label>
                        <input type="text" id="pincode" name="pincode" class="input" required pattern="[0-9]{6}" maxlength="6">
                    </div>

                    <div>
                        <label class="label">City</label>
                        <input type="text" id="city" name="city" class="input" required>
                    </div>

                    <div>
                        <label class="label">State</label>
                        <input type="text" id="state" name="state" class="input" required>
                    </div>

                    <div>
                        <label class="label">House No</label>
                        <input type="text" name="address_line1" class="input" required>
                    </div>

                    <div class="md:col-span-2">
                        <label class="label">Area, Street</label>
                        <input type="text" name="address_line2" class="input" required>
                    </div>

                </div>
            </div>

            <!-- ADDRESS TYPE -->
            <div>
                <h3 class="section-title">Address Type</h3>

                <div class="flex gap-4">
                    <button type="button" onclick="setType('home', this)" class="type-btn active">Home</button>
                    <button type="button" onclick="setType('work', this)" class="type-btn">Work</button>
                    <button type="button" onclick="setType('other', this)" class="type-btn">Other</button>
                </div>

                <input type="hidden" name="type" id="addressType" value="home">
            </div>

            <!-- DEFAULT -->
            <div class="flex items-center gap-4 pt-2">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="is_default" class="sr-only peer">

                    <div class="w-10 h-5 bg-zinc-300 rounded-full peer peer-checked:bg-black transition"></div>
                    <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition peer-checked:translate-x-5"></div>
                </label>

                <span class="text-[11px] uppercase tracking-[0.2em] text-zinc-500">
                    Set as default address
                </span>
            </div>

            <!-- ACTIONS -->
            <div class="flex justify-between items-center pt-10">

                <a href="{% url 'address' %}" 
                class="text-[11px] uppercase tracking-[0.2em] text-zinc-400 hover:text-black transition">
                    Cancel
                </a>

                <button type="submit"
                class="bg-black text-white px-10 py-3 text-[11px] uppercase tracking-[0.25em] rounded-full hover:opacity-80 transition shadow-sm">
                    Save Address
                </button>

            </div>

        </form>

    </div>

</div>

<!-- 🔥 STYLES -->
<style>

.label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #9ca3af;
}

.input {
    width: 100%;
    border-bottom: 1px solid #e4e4e7;
    padding: 8px 0;
    font-size: 13px;
    outline: none;
    transition: 0.3s;
}

.input:focus {
    border-color: black;
}

.section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #6b7280;
    margin-bottom: 12px;
}

/* TYPE BUTTON */
.type-btn {
    padding: 8px 20px;
    border-radius: 9999px;
    border: 1px solid #e4e4e7;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    transition: 0.3s;
}

.type-btn.active {
    background: black;
    color: white;
    border-color: black;
}

.type-btn:hover {
    border-color: black;
}

</style>

<!-- JS -->
<script>
function setType(type, el) {
    document.getElementById('addressType').value = type;

    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    el.classList.add('active');
}

function setType(type, el) {
    document.getElementById('addressType').value = type;

    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    el.classList.add('active');
}

</script>

{% endblock %}
