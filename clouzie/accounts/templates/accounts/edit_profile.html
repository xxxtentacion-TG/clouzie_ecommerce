<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLOUZIE | Edit Profile</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
}

/* Brand font */
.name-font {
    font-family: 'DM Serif Display', serif;
    letter-spacing: 0.05em;
}

/* Input */
.input-style {
    width: 100%;
    border: none;
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 0;
    outline: none;
}
.input-style:focus {
    border-color: black;
}

/* Buttons */
.btn-main {
    border: 1px solid black;
    padding: 10px 20px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: 0.3s;
}
.btn-main:hover {
    background: black;
    color: white;
}

.btn-cancel {
    border: 1px solid #e5e7eb;
    padding: 10px 20px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
}
</style>

</head>

<body class="bg-white text-black">

<!-- HEADER -->
<header class="border-b border-zinc-200 py-5 relative text-center">

    <button onclick="history.back()" class="absolute left-6 top-1/2 -translate-y-1/2 text-lg">
        ←
    </button>

    <h1 class="name-font text-lg uppercase tracking-[0.2em]">
        CLOUZIE
    </h1>

</header>

<!-- MAIN -->
<main class="pt-10 flex justify-center">

    <div class="w-full max-w-[480px] px-6">

        <!-- TITLE -->
        <h2 class="text-[13px] tracking-[0.35em] uppercase text-zinc-500 text-center mb-10">
            Edit Profile
        </h2>

        <!-- PROFILE IMAGE -->
        <div class="flex flex-col items-center mb-10">

            <!-- IMAGE -->
            <div class="w-[80px] h-[80px] bg-zinc-100 rounded-full flex items-center justify-center overflow-hidden">
                {% if user.profile_photo %}
                    {% load static %}

<img id="profilePreview"
     src="{% if user.profile_photo %}{{ user.profile_photo.url }}{% else %}https://via.placeholder.com/150{% endif %}"
     class="w-full h-full object-cover rounded-full">
                {% else %}
                    <svg class="w-8 h-8 text-zinc-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M6 20c0-3 2.5-6 6-6s6 3 6 6"/>
                    </svg>
                {% endif %}
            </div>

            <!-- ACTIONS -->
             <form method="POST" onsubmit="return handleSubmit(event)" enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}
            <div class="flex gap-6 mt-4 text-[11px] uppercase tracking-[0.2em]">
                <label class="cursor-pointer border-b border-black pb-1">
                    Change
                    <input type="file" name="profile_image" class="hidden" onchange="previewImage(event)">
                </label>

                <a href="#" onclick="openModal()" 
   class="text-red-500 border-b border-red-500 pb-1 inline-block">
    Remove
</a>
            </div>

        </div>

        <!-- FORM -->

            <!-- NAME -->
            <div>
                <label class="text-[11px] uppercase tracking-[0.2em] text-zinc-400">
                    Full Name
                </label>
                <input type="text" name="name" value="{{ user.username }}" class="input-style">
            </div>

            <!-- PHONE -->
            <div>
                <label class="text-[11px] uppercase tracking-[0.2em] text-zinc-400">
                    Phone Number
                </label>
                <input type="text" name="phone" value="{{ user.phone_number }}" class="input-style">
            </div>

            <!-- BUTTONS -->
            <div class="flex justify-center gap-6 pt-6">

                <button type="submit" class="btn-main">
                    Save Changes
                </button>

                <button type="button" onclick="history.back()" class="btn-cancel">
                    Cancel
                </button>

            </div>

        </form>

    </div>

</main>
<!-- CONFIRM MODAL -->
<div id="confirmModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

    <div class="bg-white w-[90%] max-w-sm p-6 text-center space-y-6">

        <p class="text-sm text-zinc-600">
            Are you sure you want to remove your profile photo?
        </p>

        <div class="flex justify-center gap-4">

            <!-- CANCEL -->
            <button onclick="closeModal()" 
                class="px-5 py-2 text-[11px] uppercase tracking-[0.2em] border border-zinc-300">
                Cancel
            </button>

            <!-- CONFIRM -->
            <a href="{% url 'remove_profile' %}" 
               class="px-5 py-2 text-[11px] uppercase tracking-[0.2em] 
                      bg-red-500 text-white hover:bg-red-600 transition-all">
                Remove
            </a>

        </div>

    </div>

</div>
<script>
function openModal() {
    document.getElementById('confirmModal').classList.remove('hidden');
    document.getElementById('confirmModal').classList.add('flex');
}

function closeModal() {
    document.getElementById('confirmModal').classList.add('hidden');
    document.getElementById('confirmModal').classList.remove('flex');
}

function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("profilePreview");

    if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
            preview.src = e.target.result;
        };

        reader.readAsDataURL(file);
    }
}

let formRef = null;

function handleSubmit(e) {
    e.preventDefault(); // stop instant submit
    formRef = e.target;

    const popup = document.getElementById('successPopup');
    popup.classList.remove('hidden');
    popup.classList.add('flex');

    return false;
}

function submitAfterPopup() {
    if (formRef) {
        formRef.submit(); // submit after clicking OK
    }
}
</script>
<!-- SUCCESS POPUP -->
<div id="successPopup" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
    <div class="bg-white w-[90%] max-w-sm p-6 text-center space-y-6">

        <p class="text-[11px] uppercase tracking-[0.2em] text-black">
            Profile updated successfully
        </p>

        <button onclick="submitAfterPopup()" 
        class="border border-black px-6 py-2 text-[11px] uppercase tracking-[0.2em] hover:bg-black hover:text-white transition">
            OK
        </button>

    </div>
</div>

</body>
</html>
