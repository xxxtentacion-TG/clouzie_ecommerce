{% load static %}
<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password | CLOUZIE Luxury Fashion</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        serif: ['"Playfair Display"', 'serif'],
        sans: ['Inter', 'sans-serif'],
      },
      colors: {
        'clouzie-grey': '#767676',
        'clouzie-light-grey': '#E5E5E5',
      }
    }
  }
}
</script>

<style>
body, html {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
}

.underline-input {
  border: none !important;
  border-bottom: 1px solid #000 !important;
  background: transparent;
  padding: 14px 0 !important;
  width: 100%;
  font-size: 12px;
  letter-spacing: 0.15em;
}

.underline-input:focus {
  outline: none !important;
  border-bottom: 2px solid #000 !important;
}

.form-container-width {
  width: 380px;
  max-width: 100%;
}
</style>

</head>

<script src="{% static 'accounts/js/forgot_password.js' %}"></script>

<body class="font-sans antialiased bg-white">

<main class="flex min-h-screen w-full">

<section class="w-full lg:w-[45%] flex flex-col items-center justify-center px-6 py-10 lg:px-16">

<header class="mb-10 text-center lg:text-left w-full max-w-[380px]">
<a href="/">
<h1 class="font-serif text-3xl tracking-tighter uppercase font-bold">CLOUZIE</h1>
</a>
</header>

<div class="w-full max-w-[380px] text-center lg:text-left">

<div class="mb-10">
<h2 class="text-xl tracking-[0.2em] mb-4 uppercase">Forgot Password</h2>
<p class="text-clouzie-grey text-sm leading-relaxed">
Enter the email address associated with your account and we will send you a verification code to reset your password.
</p>
</div>

{% if error %}
<div class="mb-8 border border-black/10 rounded-xl px-5 py-4 flex gap-4 items-start text-left">

<div class="w-[2px] bg-black h-full"></div>

<div>
<p class="text-[10px] uppercase tracking-[0.3em] text-black/40">Error</p>
<p class="text-sm mt-1">{{ error }}</p>
</div>

</div>
{% endif %}

<form class="space-y-12 text-left" method="POST">
{% csrf_token %}

<div>
<label class="block text-[10px] tracking-widest uppercase mb-1">Email</label>
<input class="underline-input placeholder-gray-300 text-center lg:text-left" name="email" placeholder="EMAIL@EXAMPLE.COM" required type="email"/>
</div>

<div class="space-y-6">

<button id="sendOtpBtn"
class="w-full bg-black text-white py-4 text-xs tracking-[0.2em] uppercase hover:bg-zinc-800 transition">
Send Reset Code
</button>

<div class="text-center lg:text-left">
<a class="text-[11px] tracking-widest uppercase text-black border-b border-black pb-0.5 hover:opacity-60 transition">
Back to login
</a>
</div>

</div>

</form>

</div>

<footer class="mt-10 text-center lg:text-left">
<p class="text-[10px] text-clouzie-grey tracking-widest">© CLOUZIE 2024</p>
</footer>

</section>

<section class="hidden lg:block lg:w-[55%] h-screen sticky top-0">
<img class="w-full h-full object-cover grayscale"
src="https://image.hm.com/assets/hm/b2/b4/b2b4e1303aa33d14df325a1e3a431b1d5ab0e773.jpg?imwidth=2160"/>
<div class="absolute inset-0 bg-black/5"></div>
</section>

</main>

</body>
</html>
