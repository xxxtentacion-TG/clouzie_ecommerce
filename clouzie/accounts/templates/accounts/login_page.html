{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | CLOUZIE</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Inter', sans-serif;
}

.logo-font {
  font-family: 'Playfair Display', serif;
  letter-spacing: -0.02em;
}

.minimal-input {
  border: none;
  border-bottom: 1px solid #e5e5e5;
  padding: 12px 0;
  width: 100%;
  font-size: 11px;
  letter-spacing: 0.12em;
}

.minimal-input:focus {
  outline: none;
  border-bottom-color: black;
}

body, html {
  height: 100%;
  overflow: hidden;
}
#authToast {
    opacity: 0;
    transform: translate(-50%, -10px);
    transition: all 0.3s ease;
}

#authToast.show {
    opacity: 1;
    transform: translate(-50%, 0);
}
</style>

</head>

<body class="bg-white text-black antialiased">

<main class="h-screen flex">

<section class="w-full lg:w-[45%] flex items-center justify-center px-6">

<div class="w-full max-w-[340px]">

<h1 class="logo-font text-2xl mb-8 text-center lg:text-left">CLOUZIE</h1>

<h2 class="text-lg tracking-[0.2em] uppercase mb-6 text-center lg:text-left">
Log In
</h2>

{% if error %}
<div class="mb-6 border border-black/10 rounded-xl px-4 py-3 flex gap-3 items-start text-sm">
<div class="w-[2px] bg-black h-full"></div>
<div>
<p class="text-[9px] uppercase tracking-[0.3em] text-black/40">Error</p>
<p class="text-xs mt-1">{{ error }}</p>
</div>
</div>
{% endif %}

<form method="POST" class="space-y-5">
{% csrf_token %}

<input type="email" name="email" placeholder="EMAIL" required class="minimal-input">

<div class="relative">
<input id="password" type="password" name="password" placeholder="PASSWORD" required class="minimal-input pr-8">

<button type="button" onclick="togglePassword(this)" class="absolute right-0 bottom-2 text-gray-400 hover:text-black">

<svg class="w-4 h-4 eye-open" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-width="1.5" d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12z"/>
<path stroke-width="1.5" d="M12 15.75a3.75 3.75 0 100-7.5 3.75 3.75 0 000 7.5z"/>
</svg>

<svg class="w-4 h-4 eye-close hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-width="1.5" d="M3 3l18 18"/>
</svg>

</button>
</div>

<a href="{% url 'forgot_password' %}" 
class="block text-[8px] tracking-[0.3em] text-gray-400 hover:text-black transition">
FORGOT PASSWORD?
</a>

<button class="w-full bg-black text-white py-3 text-[10px] tracking-[0.3em] uppercase">
LOG IN
</button>

<!-- ✅ GOOGLE BUTTON FIXED -->
{% load socialaccount %}

<a href="{% provider_login_url 'google' %}" 
   class="w-full border border-gray-300 py-3 text-[10px] tracking-[0.3em] flex items-center justify-center gap-2 hover:bg-gray-50">

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-4 h-4">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.36 1.53 7.83 2.81l5.78-5.78C33.8 3.2 29.32 1 24 1 14.6 1 6.46 6.9 2.86 15.26l6.77 5.26C11.2 14.16 16.13 9.5 24 9.5z"/>
        <path fill="#34A853" d="M46.1 24.5c0-1.6-.14-3.14-.4-4.64H24v9h12.4c-.54 2.9-2.18 5.36-4.64 7.02l7.1 5.5C43.9 36.78 46.1 31.2 46.1 24.5z"/>
        <path fill="#FBBC05" d="M9.63 28.52a14.9 14.9 0 0 1 0-9.04l-6.77-5.26A23.94 23.94 0 0 0 1 24c0 3.84.92 7.47 2.53 10.78l6.1-4.26z"/>
        <path fill="#4285F4" d="M24 47c6.48 0 11.92-2.14 15.9-5.82l-7.1-5.5c-2.04 1.38-4.66 2.2-8.8 2.2-7.87 0-12.8-4.66-14.37-10.98l-6.1 4.26C6.46 41.1 14.6 47 24 47z"/>
    </svg>

    CONTINUE WITH GOOGLE
</a>

<a href="{% url 'signup' %}" 
class="block text-center border border-black py-3 text-[10px] tracking-[0.3em] uppercase hover:bg-black hover:text-white">
REGISTER
</a>

</form>

</div>
</section>

<!-- RIGHT SIDE IMAGE -->
<section class="hidden lg:block lg:w-[55%] h-screen">
    <img 
        src="{% static 'accounts/images/login_pagenew.jpg' %}"
        alt="Register Image"
        class="w-full h-full object-cover"
    >
</section>

</main>

<script>
function togglePassword(btn) {
    const input = btn.parentElement.querySelector("input");
    const openIcon = btn.querySelector(".eye-open");
    const closeIcon = btn.querySelector(".eye-close");

    if (input.type === "password") {
        input.type = "text";
        openIcon.classList.add("hidden");
        closeIcon.classList.remove("hidden");
    } else {
        input.type = "password";
        openIcon.classList.remove("hidden");
        closeIcon.classList.add("hidden");
    }
}

function showToast(message) {
    const toast = document.getElementById("authToast");
    const text = document.getElementById("toastMessage");

    text.innerText = message;

    toast.classList.remove("hidden");

    setTimeout(() => {
        toast.classList.add("show");
    }, 10);

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => {
            toast.classList.add("hidden");
        }, 300);
    }, 3000);
}
</script>

<div id="authToast" 
     class="fixed top-6 left-1/2 -translate-x-1/2 hidden z-50">

    <div class="bg-white border border-zinc-200 shadow-lg rounded-full px-6 py-3 flex items-center gap-3 min-w-[280px] justify-center">

        <!-- ICON -->
        <div class="w-7 h-7 flex items-center justify-center rounded-full border border-zinc-300">
            <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2"
                 viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" 
                      d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <!-- TEXT -->
        <p id="toastMessage" class="text-[12px] text-zinc-700 tracking-wide text-center"></p>

    </div>

</div>

{% if messages %}
    {% for message in messages %}
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                showToast("{{ message }}");
            });
        </script>
    {% endfor %}
{% endif %}

</body>
</html>
