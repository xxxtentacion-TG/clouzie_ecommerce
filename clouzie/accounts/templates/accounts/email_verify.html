{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password | CLOUZIE</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{% static 'accounts/css/forgot_verify.css' %}">

</head>

<body class="bg-white text-black font-sans">

<main class="min-h-screen flex flex-col lg:flex-row">

<!-- LEFT -->
<section class="flex-1 flex flex-col px-6 py-12 md:px-16 lg:px-24">

<h1 class="font-serif text-3xl mb-10">CLOUZIE</h1>

<div class="max-w-md w-full mx-auto flex-grow flex flex-col justify-center">

<h2 class="text-3xl mb-4">Verify your identity</h2>
<p class="text-gray-500 text-sm mb-10">
Enter the 6-digit code sent to your email to reset your password
</p>
{% if error %}
<div id="errorBox" class="mb-6 flex items-start gap-4 border border-black/10 bg-white px-5 py-4 rounded-xl shadow-sm">

    <!-- Left indicator -->
    <div class="w-[2px] bg-black mt-1 h-full"></div>

    <!-- Content -->
    <div class="flex-1">
        <p class="text-[10px] tracking-[0.25em] uppercase text-black/50">
            Verification Error
        </p>
        <p class="text-sm mt-1 font-medium text-black">
            {{ error }}
        </p>
    </div>

    <!-- Close button -->
    <button type="button" onclick="closeError()" 
        class="text-black/30 hover:text-black text-sm transition">
        ✕
    </button>

</div>
{% endif %}
<!-- VERIFY FORM -->
<form method="POST" action="{% url 'email_verify' %}" class="space-y-8">
{% csrf_token %}

<!-- OTP -->
<div class="w-full flex justify-center mt-6">
    <div class="w-full flex justify-center mt-6">
  <div class="flex justify-center gap-2 sm:gap-3 max-w-full overflow-hidden">

    <input maxlength="1"
    class="otp-input w-[42px] h-[50px] sm:w-[56px] sm:h-[56px] rounded-2xl border border-zinc-300 text-center text-lg focus:outline-none focus:ring-0 focus:border-black" name="v1">

    <input maxlength="1"
    class="otp-input w-[42px] h-[50px] sm:w-[56px] sm:h-[56px] rounded-2xl border border-zinc-300 text-center text-lg focus:outline-none focus:ring-0 focus:border-black" name="v2">

    <input maxlength="1"
    class="otp-input w-[42px] h-[50px] sm:w-[56px] sm:h-[56px] rounded-2xl border border-zinc-300 text-center text-lg focus:outline-none focus:ring-0 focus:border-black" name="v3">

    <input maxlength="1"
    class="otp-input w-[42px] h-[50px] sm:w-[56px] sm:h-[56px] rounded-2xl border border-zinc-300 text-center text-lg focus:outline-none focus:ring-0 focus:border-black" name="v4">

    <input maxlength="1"
    class="otp-input w-[42px] h-[50px] sm:w-[56px] sm:h-[56px] rounded-2xl border border-zinc-300 text-center text-lg focus:outline-none focus:ring-0 focus:border-black" name="v5">

    <input maxlength="1"
    class="otp-input w-[42px] h-[50px] sm:w-[56px] sm:h-[56px] rounded-2xl border border-zinc-300 text-center text-lg focus:outline-none focus:ring-0 focus:border-black" name="v6">

  </div>
</div>
</div>

<!-- OTP VALID TIMER -->
<p class="text-center text-[11px] tracking-[0.25em] uppercase text-zinc-400">
OTP valid for 
<span id="otpTimer" class="text-black font-medium tracking-[0.2em]">
05:00
</span>
</p>

<button type="submit"
class="w-full bg-black text-white py-4 text-xs tracking-widest hover:bg-zinc-800 transition">
VERIFY CODE
</button>

</form>

<!-- RESEND -->
<div class="text-center mt-6">
<form method="POST" action="{% url 'forgot_resend_otp' %}">
    {% csrf_token %}
    <button type="submit" id="resendBtn"
    class="resend-disabled text-[11px] font-bold tracking-[0.2em] uppercase"
    disabled>
        Resend Code (30s)
    </button>
</form>
</div>

</div>
</section>

<!-- RIGHT IMAGE -->
<section class="hidden lg:block lg:w-[55%] h-screen">
    <img 
        src="https://image.hm.com/assets/hm/c9/48/c948be51cb2ed37a4cea1126a03b32cf4c20ced3.jpg?imwidth=2160" 
        class="w-full h-full object-cover"
    >
</section>

</main>

<!-- ✅ JS -->
<script>

// 🔥 OTP VALID TIME (5 MINUTES)
let otpTime = 300; // 5 * 60
const otpTimerEl = document.getElementById("otpTimer");

const otpInterval = setInterval(() => {
    otpTime--;

    let minutes = Math.floor(otpTime / 60);
    let seconds = otpTime % 60;

    otpTimerEl.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

    if (otpTime <= 0) {
        clearInterval(otpInterval);
        otpTimerEl.innerText = "Expired";
    }
}, 1000);


// 🔥 RESEND TIMER (30 SECONDS)
let resendTime = 30;
const resendBtn = document.getElementById("resendBtn");

const resendInterval = setInterval(() => {
    resendTime--;

    resendBtn.innerText = `Resend Code (${resendTime}s)`;

    if (resendTime <= 0) {
        clearInterval(resendInterval);

        resendBtn.disabled = false;
        resendBtn.classList.remove("resend-disabled");
        resendBtn.classList.add("resend-active");
        resendBtn.innerText = "Resend Code";
    }
}, 1000);

const inputs = document.querySelectorAll(".otp-input");

// 👉 Focus first input on load
window.addEventListener("load", () => {
    inputs[0].focus();
});

// 👉 Handle typing
inputs.forEach((input, index) => {

    input.addEventListener("input", (e) => {
        let value = e.target.value;

        // Only numbers
        value = value.replace(/[^0-9]/g, "");
        input.value = value;

        // Move to next
        if (value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {

        // Backspace → go previous
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }

    });

});


// 🔥 PASTE FULL OTP SUPPORT
inputs[0].addEventListener("paste", (e) => {
    const pasteData = e.clipboardData.getData("text").trim();

    if (/^\d{6}$/.test(pasteData)) {
        inputs.forEach((input, i) => {
            input.value = pasteData[i];
        });

        inputs[inputs.length - 1].focus();
        e.preventDefault();
    }
});
</script>

</body>
</html>
